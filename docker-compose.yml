services:
  postgres:
    image: postgres:18-alpine
    container_name: glm-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: glm
      POSTGRES_PASSWORD: glm
      POSTGRES_DB: glm
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U glm -d glm']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      target: dev
    container_name: glm-app
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://glm:glm@postgres:5432/glm
      NUXT_SESSION_PASSWORD: ${NUXT_SESSION_PASSWORD:-dev-session-password-with-min-32-chars!!}
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
